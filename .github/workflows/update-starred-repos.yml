name: Update Starred Repos

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  push:
    branches:
      - main
    paths:
      - 'articles/**'

permissions:
  contents: write

jobs:
  update-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch starred repos and update HTML
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .github/scripts/update-starred-repos.js

      - name: Generate articles index and sitemap
        run: |
          node .github/scripts/update-articles.js

      - name: Generate static article pages
        run: |
          npm install marked
          node .github/scripts/generate-article-pages.js

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html articles/index.json sitemap.xml articles/*/index.html
          git diff --staged --quiet || git commit -m "chore: update starred repos, articles, and sitemap"
          git push
